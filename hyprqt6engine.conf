#[theme]
# 指向你系统中 KDE Breeze Dark 的颜色方案文件
#color_scheme = /usr/share/color-schemes/BreezeDark.colors

# 使用 KDE Breeze Dark 图标主题
#icon_theme = klassy #Breeze-Dark

# 使用 KDE Breeze 控件样式（你系统已安装 breeze）
#style = breeze

# 字体设置（可根据喜好修改，这里保持默认）
#font = Sans Serif
#font_size = 11
#font_fixed = monospace
#font_fixed_size = 11

#[misc]
## 保持 KDE 惯有的单击打开文件行为
#single_click_activate = true
## 菜单显示图标
#menus_have_icons = true
## 显示快捷键提示
#shortcuts_for_context_menus = true
