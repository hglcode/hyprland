# ===================== 全局配置 =====================
general {
    hide_cursor = false
    ignore_empty_input = true
    immediate_render = true
    fractional_scaling = 2
}

# ===================== 认证 =====================
auth {
    pam:enabled = true
    pam:module = hyprlock
}

# ===================== 动画 =====================
animations {
    enabled = true
}
bezier = easeOut, 0.33, 1, 0.68, 1
animation = fade, 1, 0.8, easeOut

# ===================== 组件 =====================

# 1. 模糊背景
background {
    monitor =
    path = screenshot
    color = rgba(20, 20, 24, 1.0)
    blur_passes = 3
    blur_size = 8
    zindex = -1
}

# 2. 时间显示
label {
    monitor =
    text = $TIME
    color = rgba(255, 255, 255, 0.9)
    font_size = 100
    font_family = Noto Sans CJK SC
    #position = 0, 100
    halign = center
    valign = top
}

# 3. 欢迎语
label {
    monitor =
    text = Welcome back, $USER
    color = rgba(255, 255, 255, 0.7)
    font_size = 28
    position = 0, -100
    halign = center
    valign = center
}

# 4. 密码输入框 (关键修复：移除了 dots_size/dots_spacing 的小数覆盖)
input-field {
    monitor =
    size = 400, 80
    outline_thickness = 3
    rounding = 15

    outer_color = rgba(150, 180, 255, 0.8)
    inner_color = rgba(0, 0, 0, 0.5)
    font_color = rgba(255, 255, 255, 0.9)
    check_color = rgba(255, 200, 80, 0.9)
    fail_color = rgba(255, 80, 80, 0.9)

    fade_on_empty = false
    position = 0, 0
    halign = center
    valign = center
}
